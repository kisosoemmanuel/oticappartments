databases:
  - name: otic-apartments-db
    plan: free

services:
  - type: web
    name: otic-apartments
    runtime: node
    plan: free
    region: frankfurt
    numInstances: 1
    autoDeployTrigger: checksPass
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: otic-apartments-db
          property: connectionString
      - key: BACKUP_DIR
        value: /opt/render/project/src/runtime/backups
      - key: UPLOAD_DIR
        value: /opt/render/project/src/runtime/uploads
      - key: APP_BASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BACKUP_SECRET
        generateValue: true
