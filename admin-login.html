<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Login - Otic Apartments</title>
  <style>
    :root{--bg:#eff4fb;--panel:#ffffff;--line:#dbe6f2;--text:#17324d;--muted:#5a7087;--accent:#1d4ed8;--accent-strong:#163ea8}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top left,rgba(29,78,216,.12),transparent 28%),linear-gradient(180deg,#f9fbff 0%,var(--bg) 100%);font-family:Georgia,"Segoe UI",serif;color:var(--text)}
    .card{width:min(100%,480px);background:var(--panel);border:1px solid var(--line);border-radius:28px;padding:32px;box-shadow:0 20px 50px rgba(22,50,79,.12)}
    .brand{display:flex;justify-content:center;margin-bottom:18px}
    .brand img{max-width:180px;display:block}
    h1{margin:0 0 10px;font-size:34px}
    p{margin:0 0 20px;color:var(--muted)}
    label{display:block;margin:14px 0 6px;color:var(--muted)}
    input,button{width:100%;padding:14px 16px;border-radius:14px;font:inherit}
    input{border:1px solid var(--line)}
    button{border:0;background:var(--accent);color:#fff;cursor:pointer;margin-top:14px}
    button:hover{background:var(--accent-strong)}
    .status{min-height:24px;margin-top:12px;color:#b91c1c}
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">
      <img src="/brand.png" alt="Otic Apartments" />
    </div>
    <h1>Admin Login</h1>
    <p>This page is separate from the tenant portal and requires admin credentials.</p>
    <form id="loginForm">
      <label for="username">Username</label>
      <input id="username" autocomplete="username" />
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" />
      <div id="status" class="status"></div>
      <button type="submit">Sign In</button>
    </form>
  </main>
  <script>
    const ADMIN_SESSION_STORAGE_KEY = 'oticAdminSessionToken';
    const form = document.getElementById('loginForm');
    const statusEl = document.getElementById('status');

    localStorage.removeItem(ADMIN_SESSION_STORAGE_KEY);

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      statusEl.textContent = 'Signing in...';

      const res = await fetch('/api/admin/login', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value.trim(),
        }),
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        statusEl.textContent = data.error || 'Login failed';
        return;
      }

      if (data.token) {
        localStorage.setItem(ADMIN_SESSION_STORAGE_KEY, data.token);
      }

      statusEl.textContent = 'Opening admin dashboard...';

      const sessionRes = await fetch('/api/admin/session', {
        credentials: 'same-origin',
        headers: data.token ? { Authorization: `Bearer ${data.token}` } : {},
      });

      if (!sessionRes.ok) {
        const sessionData = await sessionRes.json().catch(() => ({}));
        statusEl.textContent = sessionData.error || 'Admin session could not be confirmed';
        return;
      }

      window.location.href = '/secure-admin';
    });
  </script>
</body>
</html>
